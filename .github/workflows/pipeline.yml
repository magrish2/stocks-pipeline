name: Stock pipeline

on:
  # El disparo cada 5 min lo hace Cloudflare (workflow_dispatch). No usamos el
  # cron de GitHub para no tener DOS fuentes que se cancelen entre sí.
  workflow_dispatch: {}

concurrency:
  group: stock-pipeline
  cancel-in-progress: false      # una corrida en curso NO se cancela; las extra esperan

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Escribir credenciales de Google (desde secrets)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS" > pipeline/credentials.json
          printf '%s' "$GOOGLE_TOKEN" > pipeline/token.json

      - name: Correr pipeline
        run: python pipeline/run_drive.py
